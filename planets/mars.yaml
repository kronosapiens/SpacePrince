# Mars — clipped, imperatival, direct.
# Batch of 10 verified fragments drawn from primary public-domain sources.
# See spec/PLANETS.md §7 (Mars) and §11 (Sourcing Notes).

- text: |
    Attack him where he is unprepared, appear where you are not expected.
  author: "Sun Tzu"
  source: "The Art of War, Ch. I (Laying Plans), §24"
  translation: "Lionel Giles, 1910"
  source_url: "https://www.gutenberg.org/cache/epub/132/pg132.txt"
  moods: [cut, command]

- text: |
    Rapidity is the essence of war.
  author: "Sun Tzu"
  source: "The Art of War, Ch. XI (The Nine Situations), §19"
  translation: "Lionel Giles, 1910"
  source_url: "https://www.gutenberg.org/cache/epub/132/pg132.txt"
  moods: [opening, command]

- text: |
    Make them your examples, and, esteeming courage to be freedom and freedom to be happiness, do not weigh too nicely the perils of war.
  author: "Thucydides"
  source: "History of the Peloponnesian War, Book II, §43 (Pericles' Funeral Oration)"
  translation: "Benjamin Jowett, 1881"
  source_url: "https://archive.org/details/a609583001thucuoft"
  moods: [opening, command]

- text: |
    There is one omen, and one only—that a man should fight for his country.
  author: "Homer"
  source: "Iliad, Book XII (Hector to Polydamas)"
  translation: "Samuel Butler, 1898"
  source_url: "https://www.gutenberg.org/cache/epub/2199/pg2199.txt"
  moods: [opening, command]

- text: |
    Be men, my friends, and respect one another's good opinion.
  author: "Homer"
  source: "Iliad, Book XV (Nestor rallying the Achaeans)"
  translation: "Samuel Butler, 1898"
  source_url: "https://www.gutenberg.org/cache/epub/2199/pg2199.txt"
  moods: [command, warning]

- text: |
    It is much safer to be feared than loved, when, of the two, either must be dispensed with.
  author: "Niccolò Machiavelli"
  source: "The Prince, Ch. XVII (Concerning Cruelty and Clemency)"
  translation: "W. K. Marriott, 1908"
  source_url: "https://www.gutenberg.org/cache/epub/1232/pg1232-images.html"
  moods: [cut, warning]

- text: |
    War is the father of all and the king of all; and some he has made gods and some men, some bond and some free.
  author: "Heraclitus"
  source: "Fragment 44 (Burnet)"
  translation: "John Burnet, Early Greek Philosophy, 2nd ed. 1908"
  source_url: "https://www.gutenberg.org/cache/epub/67097/pg67097.txt"
  moods: [opening, cut]

- text: |
    Do not act as if thou wert going to live ten thousand years. Death hangs over thee. While thou livest, while it is in thy power, be good.
  author: "Marcus Aurelius"
  source: "Meditations, Book IV, §17"
  translation: "George Long, 1862"
  source_url: "https://www.gutenberg.org/cache/epub/15877/pg15877.txt"
  moods: [warning, command]

- text: |
    Be not ashamed to be helped; for it is thy business to do thy duty like a soldier in the assault on a town.
  author: "Marcus Aurelius"
  source: "Meditations, Book VII, §7"
  translation: "George Long, 1862"
  source_url: "https://www.gutenberg.org/cache/epub/15877/pg15877.txt"
  moods: [command, opening]

- text: |
    The latest Gospel in this world is, Know thy work and do it.
  author: "Thomas Carlyle"
  source: "Past and Present, Book III, Ch. XI (Labour)"
  source_url: "https://www.gutenberg.org/cache/epub/13534/pg13534.txt"
  moods: [command, opening]

- text: |
    A prince ought to have no other aim or thought, nor select anything else for his study, than war and its rules and discipline.
  author: "Niccolò Machiavelli"
  source: "The Prince, Ch. XIV (That Which Concerns A Prince On The Subject Of The Art Of War)"
  translation: "W. K. Marriott, 1908"
  source_url: "https://www.gutenberg.org/cache/epub/1232/pg1232.txt"
  moods: [opening, command]

- text: |
    All warfare is based on deception.
  author: "Sun Tzu"
  source: "The Art of War, Ch. I (Laying Plans), §18"
  translation: "Lionel Giles, 1910"
  source_url: "https://www.gutenberg.org/cache/epub/132/pg132.txt"
  moods: [cut, warning]

- text: |
    The powerful exact what they can, and the weak grant what they must.
  author: "Thucydides"
  source: "History of the Peloponnesian War, Book V, §89 (Melian Dialogue)"
  translation: "Benjamin Jowett, 1881"
  source_url: "https://archive.org/details/a609583001thucuoft"
  moods: [cut, cost]

- text: |
    The art of life is more like the wrestler's art than the dancer's, in respect of this, that it should stand ready and firm to meet onsets which are sudden and unexpected.
  author: "Marcus Aurelius"
  source: "Meditations, Book VII, §61"
  translation: "George Long, 1862"
  source_url: "https://www.gutenberg.org/cache/epub/15877/pg15877.txt"
  moods: [command, warning]

- text: |
    Shame on you, to stay talking here like children, when you should fight like men.
  author: "Homer"
  source: "Iliad, Book II (Nestor to the Achaeans)"
  translation: "Samuel Butler, 1898"
  source_url: "https://www.gutenberg.org/cache/epub/2199/pg2199.txt"
  moods: [command, cut]

- text: |
    Though he slay me, yet will I trust in him: but I will maintain mine own ways before him.
  author: "The Book of Job"
  source: "Job 13:15 (Job)"
  translation: "King James Version, 1611"
  source_url: "https://www.gutenberg.org/cache/epub/10/pg10.txt"
  moods: [cut, command, saturn_secondary]

- text: |
    My righteousness I hold fast, and will not let it go: my heart shall not reproach me so long as I live.
  author: "The Book of Job"
  source: "Job 27:6 (Job)"
  translation: "King James Version, 1611"
  source_url: "https://www.gutenberg.org/cache/epub/10/pg10.txt"
  moods: [cut, command]

- text: |
    He paweth in the valley, and rejoiceth in his strength: he goeth on to meet the armed men. He mocketh at fear, and is not affrighted; neither turneth he back from the sword. He saith among the trumpets, Ha, ha; and he smelleth the battle afar off, the thunder of the captains, and the shouting.
  author: "The Book of Job"
  source: "Job 39:21–25 (the Voice from the whirlwind, on the war-horse)"
  translation: "King James Version, 1611"
  source_url: "https://www.gutenberg.org/cache/epub/10/pg10.txt"
  moods: [opening, command]

- text: |
    We will rescue each other in difficulty, we will aid each other in danger. We swear to serve the state and save the people. We ask not the same day of birth but we seek to die together.
  author: "Luo Guanzhong"
  source: "Romance of the Three Kingdoms, Ch. 1 (the Oath of the Peach Garden)"
  translation: "C. H. Brewitt-Taylor, 1925"
  source_url: "https://en.wikisource.org/wiki/San_Kuo/Volume_1/Chapter_1"
  moods: [opening, command]

- text: |
    I would rather betray the world than let the world betray me.
  author: "Luo Guanzhong"
  source: "Romance of the Three Kingdoms, Ch. 4 (Cao Cao)"
  translation: "C. H. Brewitt-Taylor, 1925"
  source_url: "https://en.wikisource.org/wiki/San_Kuo/Volume_1/Chapter_4"
  moods: [cut, warning]

- text: |
    The only heroes in the world are you and I.
  author: "Luo Guanzhong"
  source: "Romance of the Three Kingdoms, Ch. 21 (Cao Cao to Liu Bei, over green plums and warmed wine)"
  translation: "C. H. Brewitt-Taylor, 1925"
  source_url: "https://en.wikisource.org/wiki/San_Kuo/Volume_1/Chapter_21"
  moods: [cut, command]

- text: |
    Now we have but one course; we must fight to the death.
  author: "Luo Guanzhong"
  source: "Romance of the Three Kingdoms, Ch. 50 (Cao Cao at Huarong Pass)"
  translation: "C. H. Brewitt-Taylor, 1925"
  source_url: "https://en.wikisource.org/wiki/San_Kuo/Volume_1/Chapter_50"
  moods: [cut, command]

- text: |
    The number of your days is fixed. Any one who howls shall be put to death.
  author: "Luo Guanzhong"
  source: "Romance of the Three Kingdoms, Ch. 50 (Cao Cao on the flight from Red Cliffs)"
  translation: "C. H. Brewitt-Taylor, 1925"
  source_url: "https://en.wikisource.org/wiki/San_Kuo/Volume_1/Chapter_50"
  moods: [cut, warning, saturn_secondary]

- text: |
    Success depends upon the leader rather than on the number of men.
  author: "Luo Guanzhong"
  source: "Romance of the Three Kingdoms, Ch. 85 (Zhu Huan to his garrison at Ruxu)"
  translation: "C. H. Brewitt-Taylor, 1925"
  source_url: "https://en.wikisource.org/wiki/San_Kuo/Volume_2/Chapter_85"
  moods: [opening, command]

- text: |
    Wherever terror is to be faced, thou, forsooth, art in fear of death. Thy prowess lacks strength. I will go before thee. If I fall, I will establish my name.
  author: "Anonymous (Babylonian)"
  source: "Epic of Gilgamesh, Pennsylvania Tablet IV (Gilgamesh to Enkidu, on the road to Humbaba)"
  translation: "Morris Jastrow & Albert T. Clay, 1920"
  source_url: "https://www.gutenberg.org/files/11000/11000-0.txt"
  moods: [command, opening]

- text: |
    I am determined to enter the cedar forest. I will, indeed, establish my name.
  author: "Anonymous (Babylonian)"
  source: "Epic of Gilgamesh, Pennsylvania Tablet IV (Gilgamesh)"
  translation: "Morris Jastrow & Albert T. Clay, 1920"
  source_url: "https://www.gutenberg.org/files/11000/11000-0.txt"
  moods: [cut, command]

- text: |
    Be strong as a leopard, and swift as an eagle, and fleet as a gazelle, and brave as a lion, to do the will of your Father who is in heaven.
  author: "Judah ben Tema"
  source: "Pirkei Avot 5:20"
  translation: "Joshua Kulp, Mishnah Yomit (CC-BY)"
  source_url: "https://www.sefaria.org/Pirkei_Avot.5.20"
  moods: [opening, command, jupiter_secondary]

- text: |
    In a place where there are no men, strive to be a man.
  author: "Hillel"
  source: "Pirkei Avot 2:5"
  translation: "Joshua Kulp, Mishnah Yomit (CC-BY)"
  source_url: "https://www.sefaria.org/Pirkei_Avot.2.5"
  moods: [command, opening]

# Batch 4: Persian / Sufi — Ferdowsi's Shahnameh (Warner 1905–1910).
# Heroic speeches, the martial register of the Persian national epic.

- text: |
    Ye men of name! Ye worshippers of God!
    Whoe'er would 'scape the fetters of Zahhak
    Let him resort with me to Faridun
    And shadow in his Grace.
  author: "Ferdowsi"
  source: "Shahnameh, Zahhak section §5 (Kawa the Smith raising the apron-standard)"
  translation: "Arthur George Warner & Edmond Warner, 1905"
  source_url: "https://archive.org/details/FirdausiShahnamaTrWarnerVol1"
  moods: [opening, command]

- text: |
    I came not from Iran to bring him pardon.
  author: "Ferdowsi"
  source: "Shahnameh, Zahhak §7 (Faridun to the sisters of Jamshid)"
  translation: "Arthur George Warner & Edmond Warner, 1905"
  source_url: "https://archive.org/details/FirdausiShahnamaTrWarnerVol1"
  moods: [cut, command]

- text: |
    Though he slay me, yet will I trust in him.
    A bow is useless if it be not bent.
  author: "Ferdowsi"
  source: "Shahnameh, Faridun §13 (after the murder of Iraj)"
  translation: "Arthur George Warner & Edmond Warner, 1905"
  source_url: "https://archive.org/details/FirdausiShahnamaTrWarnerVol1"
  moods: [command, cut, saturn_secondary]

- text: |
    Whenever thou dost thirst for blood and stain
    Therewith thy glittering dagger, destiny
    Will be athirst for thy blood, and ordain
    Each hair of thine to be a sword for thee.
  author: "Ferdowsi"
  source: "Shahnameh, Kai Kaus §21 ('How Suhrab was slain by Rustam')"
  translation: "Arthur George Warner & Edmond Warner, 1906"
  source_url: "https://archive.org/details/FirdausiShahnamaTrWarnerVol2"
  moods: [warning, cut, saturn_secondary]

- text: |
    I came like lightning and like wind I go.
  author: "Ferdowsi"
  source: "Shahnameh, Kai Kaus §21 (Suhrab, dying, to Rustam)"
  translation: "Arthur George Warner & Edmond Warner, 1906"
  source_url: "https://archive.org/details/FirdausiShahnamaTrWarnerVol2"
  moods: [cut, ending, saturn_secondary]

- text: |
    Who then this Travel to Result would bring
    Needs both a Lion's Heart beneath the Wing,
    And even more, a Spirit purified
    Of Worldly Passion, Malice, Lust, and Pride.
  author: "Attar"
  source: "Bird Parliament (Conference of the Birds), Tajidar to the birds"
  translation: "Edward FitzGerald, 1889"
  source_url: "https://archive.org/details/BirdParliamentEnglishFareeduddinAttaarFitzgerald"
  moods: [opening, command, jupiter_secondary]
