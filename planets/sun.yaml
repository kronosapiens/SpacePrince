# Sun — sovereign, declarative, present-tense, unqualified.
# Curated keepers from the source review.
# See spec/concept/PLANETS.md §3 (Sun) and §11 (Sourcing Notes).

- text: |
    Trust thyself: every heart vibrates to that iron string.
  author: "Ralph Waldo Emerson"
  source: "Essays: First Series, 'Self-Reliance'"
  source_url: "https://en.wikisource.org/wiki/Essays:_First_Series/Self-Reliance"
  moods: [opening, declaration]

- text: |
    Nothing is at last sacred but the integrity of your own mind.
  author: "Ralph Waldo Emerson"
  source: "Essays: First Series, 'Self-Reliance'"
  source_url: "https://www.gutenberg.org/cache/epub/2944/pg2944.txt"
  moods: [opening, cut, declaration]

- text: |
    To be great is to be misunderstood.
  author: "Ralph Waldo Emerson"
  source: "Essays: First Series, 'Self-Reliance'"
  source_url: "https://www.gutenberg.org/cache/epub/2944/pg2944.txt"
  moods: [declaration, cut]

- text: |
    It is easy in the world to live after the world's opinion; it is easy in solitude to live after our own; but the great man is he who in the midst of the crowd keeps with perfect sweetness the independence of solitude.
  author: "Ralph Waldo Emerson"
  source: "Essays: First Series, 'Self-Reliance'"
  source_url: "https://www.gutenberg.org/cache/epub/2944/pg2944.txt"
  moods: [opening, declaration]

- text: |
    Always do what you are afraid to do.
  author: "Ralph Waldo Emerson"
  source: "Essays: First Series, 'Heroism'"
  source_url: "https://www.gutenberg.org/cache/epub/2944/pg2944.txt"
  moods: [cut, command]

- text: |
    Build, therefore, your own world. As fast as you conform your life to the pure idea in your mind, that will unfold its great proportions.
  author: "Ralph Waldo Emerson"
  source: "Nature, Ch. VIII (Prospects)"
  source_url: "https://www.gutenberg.org/cache/epub/29433/pg29433.txt"
  moods: [opening, command, declaration, jupiter_secondary]

- text: |
    Do I contradict myself?
    Very well then I contradict myself,
    (I am large, I contain multitudes.)
  author: "Walt Whitman"
  source: "Leaves of Grass, 'Song of Myself' §51"
  source_url: "https://en.wikisource.org/wiki/Leaves_of_Grass/Book_III"
  moods: [declaration, paradox]

- text: |
    Not I, not any one else can travel that road for you,
    You must travel it for yourself.
  author: "Walt Whitman"
  source: "Leaves of Grass, 'Song of Myself' §46"
  source_url: "https://en.wikisource.org/wiki/Leaves_of_Grass/Book_III"
  moods: [opening, cut]

- text: |
    The universe is transformation: life is opinion.
  author: "Marcus Aurelius"
  source: "Meditations, Book IV.3"
  translation: "George Long, 1862"
  source_url: "https://en.wikisource.org/wiki/The_Thoughts_of_the_Emperor_Marcus_Aurelius_Antoninus/Book_IV"
  moods: [opening, declaration]

- text: |
    If thou art pained by any external thing, it is not this thing that disturbs thee, but thy own judgment about it. And it is in thy power to wipe out this judgment now.
  author: "Marcus Aurelius"
  source: "Meditations, Book VIII.47"
  translation: "George Long, 1862"
  source_url: "https://en.wikisource.org/wiki/The_Thoughts_of_the_Emperor_Marcus_Aurelius_Antoninus/Book_VIII"
  moods: [cut, declaration]

- text: |
    Let right deeds be
    Thy motive, not the fruit which comes from them.
  author: "The Bhagavad Gita"
  source: "Chapter II"
  title: ""
  translation: "Edwin Arnold, The Song Celestial, 1885"
  source_url: "https://www.gutenberg.org/cache/epub/2388/pg2388-images.html"
  moods: [opening, cut]

- text: |
    The hour of departure has arrived, and we go our ways—I to die, and you to live. Which is better God only knows.
  author: "Plato"
  source: "Apology (Socrates, closing address to the jury)"
  translation: "Benjamin Jowett, 1871"
  source_url: "https://www.gutenberg.org/cache/epub/1656/pg1656.txt"
  moods: [ending, declaration, saturn_secondary]

- text: |
    He knows nothing, and thinks that he knows; I neither know nor think that I know. In this latter particular, then, I seem to have slightly the advantage of him.
  author: "Plato"
  source: "Apology (Socrates, on testing the oracle)"
  translation: "Benjamin Jowett, 1871"
  source_url: "https://www.gutenberg.org/cache/epub/1656/pg1656.txt"
  moods: [opening, declaration, mercury_secondary]

- text: |
    The difficulty, my friends, is not to avoid death, but to avoid unrighteousness; for that runs faster than death.
  author: "Plato"
  source: "Apology (Socrates, after the verdict)"
  translation: "Benjamin Jowett, 1871"
  source_url: "https://www.gutenberg.org/cache/epub/1656/pg1656.txt"
  moods: [opening, cut, declaration]

- text: |
    A happy and cheerful life is not from without; on the contrary, a man adds the pleasure and gratification to the things that surround him, his temperament being as it were the source of his feelings.
  author: "Plutarch"
  source: "Moralia, 'On Virtue and Vice' §I"
  translation: "A. R. Shilleto, 1898"
  source_url: "https://www.gutenberg.org/cache/epub/23639/pg23639.txt"
  moods: [opening, declaration]

- text: |
    None but the sun can display the sun,
    If you would see it displayed, turn not away from it.
  author: "Rumi"
  source: "Masnavi, Book I, Description of Love"
  translation: "E. H. Whinfield, 1887"
  source_url: "https://archive.org/details/masnaviimanavi"
  moods: [opening, beauty, sun_secondary]

- text: |
    The latest Gospel in this world is, Know thy work and do it.
  author: "Thomas Carlyle"
  source: "Past and Present, Book III, Ch. XI (Labour)"
  source_url: "https://www.gutenberg.org/cache/epub/13534/pg13534.txt"
  moods: [command, opening]

- text: |
    My righteousness I hold fast, and will not let it go;
    My heart shall not reproach me so long as I live.
  author: "The Book of Job"
  source: "Job 27:6 (Job)"
  translation: "Jewish Publication Society, 1917"
  source_url: "https://www.sefaria.org/Job.27.6"
  moods: [cut, command]
