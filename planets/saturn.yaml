# Saturn — measured, austere, patient.
# Pilot batch of 10 verified fragments drawn from primary public-domain sources.
# See spec/PLANETS.md §9 (Saturn) and §11 (Sourcing Notes).

- text: |
    Then shall the dust return to the earth as it was: and the spirit shall return unto God who gave it.
  author: "Ecclesiastes"
  source: "Ecclesiastes 12:7 (KJV)"
  translation: "King James Version, 1611"
  source_url: "https://en.wikisource.org/wiki/Bible_(King_James)/Ecclesiastes"
  moods: [ending, cost]

- text: |
    Let Death and Exile, and all other Things which appear terrible, be daily before your Eyes; but chiefly Death: and you will never entertain any abject Thought, nor too eagerly covet any thing.
  author: "Epictetus"
  source: "Encheiridion §XXI"
  translation: "Elizabeth Carter, 1758"
  source_url: "https://en.wikisource.org/wiki/All_the_Works_of_Epictetus,_Which_Are_Now_Extant/The_Encheiridion"
  moods: [warning, opening]

- text: |
    While we are postponing, life speeds by.
  author: "Seneca"
  source: "Epistulae Morales ad Lucilium, Letter 1.2"
  translation: "Richard M. Gummere (Loeb), 1917"
  source_url: "https://en.wikisource.org/wiki/Moral_letters_to_Lucilius/Letter_1"
  moods: [cost, warning]

- text: |
    Infinitely swift is the flight of time, as those see more clearly who are looking backwards.
  author: "Seneca"
  source: "Epistulae Morales ad Lucilium, Letter 49.2"
  translation: "Richard M. Gummere (Loeb), 1917"
  source_url: "https://en.wikisource.org/wiki/Moral_letters_to_Lucilius/Letter_49"
  moods: [ending, reverie]

- text: |
    It is not the last step that causeth weariness: it only declares it.
  author: "Michel de Montaigne"
  source: "Essays, Book I, Ch. XIX ('That to philosophise is to learne how to die')"
  translation: "John Florio, 1603"
  source_url: "https://en.wikisource.org/wiki/Montaigne%27s_Essays/Book_I/Chapter_XIX"
  moods: [ending, cost]

- text: |
    All daies march towards death, only the last comes to it.
  author: "Michel de Montaigne"
  source: "Essays, Book I, Ch. XIX ('That to philosophise is to learne how to die')"
  translation: "John Florio, 1603"
  source_url: "https://en.wikisource.org/wiki/Montaigne%27s_Essays/Book_I/Chapter_XIX"
  moods: [opening, ending]

- text: |
    Life is a task to be done.
  author: "Arthur Schopenhauer"
  source: "Studies in Pessimism, 'On the Sufferings of the World'"
  translation: "T. Bailey Saunders, 1890"
  source_url: "https://www.gutenberg.org/files/10732/10732-h/10732-h.htm"
  moods: [opening, cost]

- text: |
    Unrest is the mark of existence.
  author: "Arthur Schopenhauer"
  source: "Studies in Pessimism, 'The Vanity of Existence'"
  translation: "T. Bailey Saunders, 1890"
  source_url: "https://www.gutenberg.org/files/10732/10732-h/10732-h.htm"
  moods: [opening, warning]

- text: |
    The eternal silence of these infinite spaces frightens me.
  author: "Blaise Pascal"
  source: "Pensées §206 (Brunschvicg)"
  translation: "W. F. Trotter, 1910"
  source_url: "https://www.gutenberg.org/files/18269/18269-h/18269-h.htm#p_206"
  moods: [reverie, ending]

- text: |
    For truly in adverse fortune the worst sting of misery is to have been happy.
  author: "Boethius"
  source: "The Consolation of Philosophy, Book II, Prose IV"
  translation: "H. R. James, 1897"
  source_url: "https://www.gutenberg.org/files/14328/14328-h/14328-h.htm"
  moods: [cost, reverie]

- text: |
    Suffering is one very long moment. We cannot divide it by seasons.
  author: "Oscar Wilde"
  source: "De Profundis"
  source_url: "https://www.gutenberg.org/files/921/921-h/921-h.htm"
  moods: [opening, cost]

- text: |
    Behind sorrow there is always sorrow.
  author: "Oscar Wilde"
  source: "De Profundis"
  source_url: "https://www.gutenberg.org/files/921/921-h/921-h.htm"
  moods: [reverie, cost]

- text: |
    And thus we rust Life's iron chain, degraded and alone.
  author: "Oscar Wilde"
  source: "The Ballad of Reading Gaol, Part V"
  source_url: "https://www.gutenberg.org/cache/epub/301/pg301-images.html"
  moods: [ending, cost]

- text: |
    Our disease lies in the mind, which cannot escape from itself.
  author: "Michel de Montaigne"
  source: "Essays, Book I, Ch. XXXVIII ('Of Solitude')"
  translation: "Charles Cotton, 1685–1686"
  source_url: "https://en.wikisource.org/wiki/The_Essays_of_Montaigne/Book_I/Chapter_XXXVIII"
  moods: [opening, warning]

- text: |
    Retire yourself into yourself, but first prepare yourself there to receive yourself.
  author: "Michel de Montaigne"
  source: "Essays, Book I, Ch. XXXVIII ('Of Solitude')"
  translation: "Charles Cotton, 1685–1686"
  source_url: "https://en.wikisource.org/wiki/The_Essays_of_Montaigne/Book_I/Chapter_XXXVIII"
  moods: [opening, reverie]

- text: |
    To die of old age is a death rare, extraordinary, and singular.
  author: "Michel de Montaigne"
  source: "Essays, Book I, Ch. LVII ('Of Age')"
  translation: "Charles Cotton, 1685–1686"
  source_url: "https://en.wikisource.org/wiki/The_Essays_of_Montaigne/Book_I/Chapter_LVII"
  moods: [ending, reverie]

- text: |
    It is better to leave a vessel unfilled, than to attempt to carry it when it is full. If you keep feeling a point that has been sharpened, the point cannot long preserve its sharpness.
  author: "Lao Tzu"
  source: "Tao Te Ching, Ch. 9"
  translation: "James Legge, 1891"
  source_url: "https://www.gutenberg.org/cache/epub/216/pg216.txt"
  moods: [warning, cost]

- text: |
    When the work is done, and one's name is becoming distinguished, to withdraw into obscurity is the way of Heaven.
  author: "Lao Tzu"
  source: "Tao Te Ching, Ch. 9"
  translation: "James Legge, 1891"
  source_url: "https://www.gutenberg.org/cache/epub/216/pg216.txt"
  moods: [ending, opening]

- text: |
    He who knows other men is discerning; he who knows himself is intelligent. He who overcomes others is strong; he who overcomes himself is mighty. He who is satisfied with his lot is rich.
  author: "Lao Tzu"
  source: "Tao Te Ching, Ch. 33"
  translation: "James Legge, 1891"
  source_url: "https://www.gutenberg.org/cache/epub/216/pg216.txt"
  moods: [opening, cost]

- text: |
    Who is content
    Needs fear no shame.
    Who knows to stop
    Incurs no blame.
    From danger free
    Long live shall he.
  author: "Lao Tzu"
  source: "Tao Te Ching, Ch. 44"
  translation: "James Legge, 1891"
  source_url: "https://www.gutenberg.org/cache/epub/216/pg216.txt"
  moods: [opening, warning]

- text: |
    There is no guilt greater than to sanction ambition; no calamity greater than to be discontented with one's lot; no fault greater than the wish to be getting. Therefore the sufficiency of contentment is an enduring and unchanging sufficiency.
  author: "Lao Tzu"
  source: "Tao Te Ching, Ch. 46"
  translation: "James Legge, 1891"
  source_url: "https://www.gutenberg.org/cache/epub/216/pg216.txt"
  moods: [warning, cost]

- text: |
    Man at his birth is supple and weak; at his death, firm and strong. (So it is with) all things. Trees and plants, in their early growth, are soft and brittle; at their death, dry and withered. Thus it is that firmness and strength are the concomitants of death; softness and weakness, the concomitants of life.
  author: "Lao Tzu"
  source: "Tao Te Ching, Ch. 76"
  translation: "James Legge, 1891"
  source_url: "https://www.gutenberg.org/cache/epub/216/pg216.txt"
  moods: [ending, reverie]
