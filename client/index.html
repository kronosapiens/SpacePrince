<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Space Prince</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Self-hosted fonts (woff2 in /public/fonts, latin subset). Declared
         inline so there's no render-blocking external stylesheet and the files
         sit on the warm first-party connection. Cormorant + Inter are variable,
         so one file covers each weight range. Above-the-fold cuts are
         preloaded; italic is declared for future use but not preloaded. -->
    <link rel="preload" href="/fonts/cormorant-garamond-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/inter-latin.woff2" as="font" type="font/woff2" crossorigin />
    <style>
      @font-face {
        font-family: "Cormorant Garamond";
        font-style: normal;
        font-weight: 400 600;
        font-display: swap;
        src: url("/fonts/cormorant-garamond-latin.woff2") format("woff2");
      }
      @font-face {
        font-family: "Cormorant Garamond";
        font-style: italic;
        font-weight: 400;
        font-display: swap;
        src: url("/fonts/cormorant-garamond-italic-latin.woff2") format("woff2");
      }
      @font-face {
        font-family: "Inter";
        font-style: normal;
        font-weight: 400 500;
        font-display: swap;
        src: url("/fonts/inter-latin.woff2") format("woff2");
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
