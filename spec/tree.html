<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tree of Life Topology Playground</title>
<style>
  :root {
    --bg: #0d0b14;
    --panel: #15121e;
    --border: #221d2e;
    --text: #d8d3e8;
    --muted: #7a7388;
    --dim: #4a4557;
    --accent: #c9a66b;

    --node-central: #e8dfc8;
    --node-central-stroke: #c9a66b;
    --node-side: #9a8fb0;
    --node-side-stroke: #5d5473;

    --edge-pillar: #7a7388;
    --edge-horizontal: #554d6a;
    --edge-bookend-upper: #6b8fb5;  /* descent, cool */
    --edge-bookend-lower: #b5876b;  /* ascent, warm */
    --edge-cross: #6e8b6e;  /* adjacent-double X */
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    display: flex;
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  .sidebar {
    width: 340px;
    padding: 28px 24px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    background: var(--panel);
  }

  .title {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin: 0 0 4px 0;
    color: var(--accent);
  }

  .subtitle {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 28px;
    font-style: italic;
  }

  h3 {
    font-weight: 500;
    margin: 0 0 12px 0;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .section { margin-bottom: 24px; }

  button.primary {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 12px 16px;
    cursor: pointer;
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    width: 100%;
    font-weight: 600;
    transition: opacity 0.15s;
  }
  button.primary:hover { opacity: 0.85; }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .slider-row label {
    width: 30px;
    font-size: 11px;
    color: var(--muted);
    font-family: ui-monospace, monospace;
  }
  .slider-row input[type=range] {
    flex: 1;
    accent-color: var(--accent);
  }
  .slider-row .value {
    width: 36px;
    font-size: 11px;
    text-align: right;
    color: var(--muted);
    font-family: ui-monospace, monospace;
  }

  .force-row {
    display: flex;
    gap: 6px;
    margin-bottom: 6px;
    align-items: center;
  }
  .force-row label {
    width: 30px;
    font-size: 11px;
    color: var(--muted);
    font-family: ui-monospace, monospace;
  }
  .toggle-btn {
    padding: 5px 10px;
    font-size: 11px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    font-family: ui-monospace, monospace;
    transition: all 0.15s;
    flex: 1;
  }
  .toggle-btn:hover { border-color: var(--dim); color: var(--text); }
  .toggle-btn.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    font-weight: 600;
  }

  .readout {
    font-family: ui-monospace, monospace;
    font-size: 11px;
    color: var(--muted);
    padding: 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    line-height: 1.8;
  }
  .readout .k { color: var(--dim); }
  .readout .v { color: var(--text); }

  .legend {
    font-size: 10px;
    color: var(--muted);
    line-height: 1.8;
    font-family: ui-monospace, monospace;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 2px;
  }
  .legend-swatch {
    width: 18px;
    height: 2px;
    flex-shrink: 0;
  }

  .main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  svg {
    width: 100%;
    height: 100%;
    max-width: 560px;
    max-height: 760px;
  }

  .node { stroke-width: 2; transition: all 0.3s ease; }
  .node-central { fill: var(--node-central); stroke: var(--node-central-stroke); }
  .node-side { fill: var(--node-side); stroke: var(--node-side-stroke); }

  .edge { stroke-width: 1.5; fill: none; opacity: 0.85; transition: all 0.3s ease; }
  .edge-pillar { stroke: var(--edge-pillar); stroke-width: 2; }
  .edge-horizontal { stroke: var(--edge-horizontal); }
  .edge-bookend-upper { stroke: var(--edge-bookend-upper); }
  .edge-bookend-lower { stroke: var(--edge-bookend-lower); }
  .edge-cross { stroke: var(--edge-cross); }

  .node-label {
    fill: var(--bg);
    font-size: 9px;
    text-anchor: middle;
    font-family: ui-monospace, monospace;
    font-weight: 600;
    pointer-events: none;
  }

  .warning {
    font-size: 10px;
    color: #c47474;
    font-style: italic;
    margin-top: 6px;
  }

  hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="title">Tree of Life</div>
  <div class="subtitle">topology playground</div>

  <div class="section">
    <button class="primary" id="reseed">Generate New Tree</button>
  </div>

  <hr>

  <div class="section">
    <h3>Double Probability · L2–L6</h3>
    <div id="sliders"></div>
  </div>

  <div class="section">
    <h3>Force Layer · override</h3>
    <div id="forcers"></div>
  </div>

  <hr>

  <div class="section">
    <h3>Readout</h3>
    <div class="readout">
      <div><span class="k">pattern</span> &nbsp; <span class="v" id="pattern-readout">—</span></div>
      <div><span class="k">nodes</span> &nbsp;&nbsp;&nbsp; <span class="v" id="node-count">—</span></div>
      <div><span class="k">edges</span> &nbsp;&nbsp;&nbsp; <span class="v" id="edge-count">—</span></div>
      <div><span class="k">seed</span> &nbsp;&nbsp;&nbsp;&nbsp; <span class="v" id="seed-readout">—</span></div>
      <div id="warning-slot"></div>
    </div>
  </div>

  <div class="section">
    <h3>Edge Types</h3>
    <div class="legend">
      <div class="legend-item"><span class="legend-swatch" style="background:var(--edge-pillar);height:2px"></span>pillar spine</div>
      <div class="legend-item"><span class="legend-swatch" style="background:var(--edge-horizontal)"></span>horizontal pair</div>
      <div class="legend-item"><span class="legend-swatch" style="background:var(--edge-bookend-upper)"></span>bookend · upper (descent)</div>
      <div class="legend-item"><span class="legend-swatch" style="background:var(--edge-bookend-lower)"></span>bookend · lower (ascent)</div>
      <div class="legend-item"><span class="legend-swatch" style="background:var(--edge-cross)"></span>adjacent-double cross</div>
    </div>
  </div>
</div>

<div class="main">
  <svg id="tree" viewBox="-280 -40 560 740" preserveAspectRatio="xMidYMid meet"></svg>
</div>

<script>
// ───────────────────────────────────────────────────────────
// Seeded RNG (mulberry32)
// ───────────────────────────────────────────────────────────
function mulberry32(a) {
  return function() {
    var t = a += 0x6D2B79F5;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ───────────────────────────────────────────────────────────
// State
// ───────────────────────────────────────────────────────────
const NUM_LAYERS = 7;
// Bias defaults toward canonical [1,2,2,1,2,1,1]:
// L2=double(70%), L3=double(70%), L4=single(30%=double), L5=double(70%), L6=single(30%=double)
let probabilities = [0.50, 0.50, 0.50, 0.50, 0.50];
let forcedPattern = [null, null, null, null, null]; // null | 1 | 2
let currentSeed = Math.floor(Math.random() * 1000000);

// ───────────────────────────────────────────────────────────
// Generation
// ───────────────────────────────────────────────────────────
function generateLayerPattern(rng) {
  const pattern = [1]; // L1 always single
  for (let i = 0; i < 5; i++) {
    if (forcedPattern[i] !== null) {
      pattern.push(forcedPattern[i]);
    } else {
      pattern.push(rng() < probabilities[i] ? 2 : 1);
    }
  }
  pattern.push(1); // L7 always single
  return pattern;
}

function generateNodes(pattern) {
  const nodes = [];
  for (let layer = 0; layer < NUM_LAYERS; layer++) {
    if (pattern[layer] === 1) {
      nodes.push({ layer, pillar: 'C', id: `${layer+1}C` });
    } else {
      nodes.push({ layer, pillar: 'L', id: `${layer+1}L` });
      nodes.push({ layer, pillar: 'R', id: `${layer+1}R` });
    }
  }
  return nodes;
}

function nodesAtLayer(nodes, layer) { return nodes.filter(n => n.layer === layer); }
function nodesInPillar(nodes, pillar) { return nodes.filter(n => n.pillar === pillar); }

function generateEdges(nodes, pattern) {
  const edges = [];

  // 1. Pillar spines: consecutive same-pillar nodes connect
  for (const pillar of ['C', 'L', 'R']) {
    const pillarNodes = nodesInPillar(nodes, pillar).sort((a, b) => a.layer - b.layer);
    for (let i = 0; i < pillarNodes.length - 1; i++) {
      edges.push({ from: pillarNodes[i].id, to: pillarNodes[i+1].id, type: 'pillar' });
    }
  }

  // 2. Horizontal pairs: L-R in each double layer
  for (let layer = 0; layer < NUM_LAYERS; layer++) {
    if (pattern[layer] === 2) {
      const layerNodes = nodesAtLayer(nodes, layer);
      const L = layerNodes.find(n => n.pillar === 'L');
      const R = layerNodes.find(n => n.pillar === 'R');
      edges.push({ from: L.id, to: R.id, type: 'horizontal' });
    }
  }

  // 3. Asymmetric bookend edges between consecutive centrals
  const centralLayers = [];
  for (let layer = 0; layer < NUM_LAYERS; layer++) {
    if (pattern[layer] === 1) centralLayers.push(layer);
  }

  for (let ci = 0; ci < centralLayers.length - 1; ci++) {
    const upperLayer = centralLayers[ci];
    const lowerLayer = centralLayers[ci + 1];
    const doubleLayers = [];
    for (let l = upperLayer + 1; l < lowerLayer; l++) doubleLayers.push(l);
    if (doubleLayers.length === 0) continue;

    const upperCentral = nodesAtLayer(nodes, upperLayer)[0];
    const lowerCentral = nodesAtLayer(nodes, lowerLayer)[0];

    // Upper bookend → immediate double layer below only
    const immediate = nodesAtLayer(nodes, doubleLayers[0]);
    for (const n of immediate) {
      edges.push({ from: upperCentral.id, to: n.id, type: 'bookend-upper' });
    }

    // Lower bookend → every double layer in segment above
    for (const dl of doubleLayers) {
      for (const n of nodesAtLayer(nodes, dl)) {
        edges.push({ from: lowerCentral.id, to: n.id, type: 'bookend-lower' });
      }
    }
  }

  // 4. Adjacent-double cross: X between consecutive double layers
  for (let layer = 0; layer < NUM_LAYERS - 1; layer++) {
    if (pattern[layer] === 2 && pattern[layer + 1] === 2) {
      const upper = nodesAtLayer(nodes, layer);
      const lower = nodesAtLayer(nodes, layer + 1);
      const UL = upper.find(n => n.pillar === 'L');
      const UR = upper.find(n => n.pillar === 'R');
      const LL = lower.find(n => n.pillar === 'L');
      const LR = lower.find(n => n.pillar === 'R');
      edges.push({ from: UL.id, to: LR.id, type: 'cross' });
      edges.push({ from: UR.id, to: LL.id, type: 'cross' });
    }
  }

  return edges;
}

// ───────────────────────────────────────────────────────────
// Layout
// ───────────────────────────────────────────────────────────
function layoutNodes(nodes) {
  const layerSpacing = 105;
  const pillarSpacing = 105;
  const topMargin = 20;
  return nodes.map(n => ({
    ...n,
    x: n.pillar === 'C' ? 0 : (n.pillar === 'L' ? -pillarSpacing : pillarSpacing),
    y: topMargin + n.layer * layerSpacing
  }));
}

// ───────────────────────────────────────────────────────────
// Render
// ───────────────────────────────────────────────────────────
function render() {
  const rng = mulberry32(currentSeed);
  const pattern = generateLayerPattern(rng);
  const nodes = generateNodes(pattern);
  const edges = generateEdges(nodes, pattern);
  const positioned = layoutNodes(nodes);
  const byId = Object.fromEntries(positioned.map(n => [n.id, n]));

  const svg = document.getElementById('tree');
  svg.innerHTML = '';

  const NS = 'http://www.w3.org/2000/svg';

  // Draw edges (background layer)
  for (const edge of edges) {
    const from = byId[edge.from];
    const to = byId[edge.to];
    const line = document.createElementNS(NS, 'line');
    line.setAttribute('x1', from.x);
    line.setAttribute('y1', from.y);
    line.setAttribute('x2', to.x);
    line.setAttribute('y2', to.y);
    line.setAttribute('class', `edge edge-${edge.type}`);
    svg.appendChild(line);
  }

  // Draw nodes (foreground)
  for (const node of positioned) {
    const circle = document.createElementNS(NS, 'circle');
    circle.setAttribute('cx', node.x);
    circle.setAttribute('cy', node.y);
    circle.setAttribute('r', 18);
    circle.setAttribute('class', `node ${node.pillar === 'C' ? 'node-central' : 'node-side'}`);
    svg.appendChild(circle);

    const label = document.createElementNS(NS, 'text');
    label.setAttribute('x', node.x);
    label.setAttribute('y', node.y + 3);
    label.setAttribute('class', 'node-label');
    label.textContent = node.id;
    svg.appendChild(label);
  }

  // Readout
  document.getElementById('pattern-readout').textContent = `[${pattern.join(',')}]`;
  document.getElementById('node-count').textContent = nodes.length;
  document.getElementById('edge-count').textContent = edges.length;
  document.getElementById('seed-readout').textContent = currentSeed;

  // Warnings
  const warnSlot = document.getElementById('warning-slot');
  warnSlot.innerHTML = '';
  const doubleCount = pattern.filter(n => n === 2).length;
  if (doubleCount === 0) {
    warnSlot.innerHTML = '<div class="warning">⚠ all singles — Tree degenerates to a column</div>';
  } else if (doubleCount === 1) {
    warnSlot.innerHTML = '<div class="warning">⚠ single double — below constraint of ≥2</div>';
  }
}

// ───────────────────────────────────────────────────────────
// Controls
// ───────────────────────────────────────────────────────────
function buildSliders() {
  const container = document.getElementById('sliders');
  container.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    const row = document.createElement('div');
    row.className = 'slider-row';
    const step = Math.round(probabilities[i] * 10);
    row.innerHTML = `
      <label>L${i+2}</label>
      <input type="range" min="0" max="10" step="1" value="${step}" data-idx="${i}">
      <span class="value">${step}/10</span>
    `;
    container.appendChild(row);
  }
  container.addEventListener('input', (e) => {
    if (e.target.type !== 'range') return;
    const idx = parseInt(e.target.dataset.idx);
    const step = parseInt(e.target.value);
    probabilities[idx] = step / 10;
    e.target.parentElement.querySelector('.value').textContent = `${step}/10`;
    render();
  });
}

function buildForcers() {
  const container = document.getElementById('forcers');
  container.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    const row = document.createElement('div');
    row.className = 'force-row';
    const cur = forcedPattern[i];
    row.innerHTML = `
      <label>L${i+2}</label>
      <button class="toggle-btn ${cur===null?'active':''}" data-idx="${i}" data-val="null">auto</button>
      <button class="toggle-btn ${cur===1?'active':''}" data-idx="${i}" data-val="1">1</button>
      <button class="toggle-btn ${cur===2?'active':''}" data-idx="${i}" data-val="2">2</button>
    `;
    container.appendChild(row);
  }
  container.addEventListener('click', (e) => {
    if (!e.target.classList.contains('toggle-btn')) return;
    const idx = parseInt(e.target.dataset.idx);
    const val = e.target.dataset.val;
    forcedPattern[idx] = val === 'null' ? null : parseInt(val);
    buildForcers();
    render();
  });
}

document.getElementById('reseed').addEventListener('click', () => {
  currentSeed = Math.floor(Math.random() * 1000000);
  render();
});

buildSliders();
buildForcers();
render();
</script>

</body>
</html>
